name: Telegram CSV to GAS Cloud Flow

# ⚙️ 設定什麼時候觸發執行
on:
  schedule:
    # 💡 這裡採用國際標準 Cron 表達式 (時間為 UTC 零時區，台灣時間要 -8 小時)
    # 範例：每週四 中午 12:00 執行（台灣時間 12點 = UTC 時間 04:00）
    - cron: '0 22 * * 2'
  
  # ✅ 保留手動觸發按鈕，方便你隨時想測就測
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    # 1. 複製倉庫代碼
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 初始化 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安裝 Requests 套件
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. 執行重構後的雲端腳本
    - name: Run Cloud Bot Script
      env:
        # 🔒 將 GitHub Secrets 的密鑰安全注入環境變數中
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
      run: python tg_to_gas_cloud.py

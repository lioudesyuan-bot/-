name: 每週三自動金流爬蟲排程

on:
  schedule:
    - cron: '0 2 * * 3'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-crawler:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. 複製專案程式碼
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝 Linux 系統底層的 Chrome 瀏覽器
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 4. 安裝 Python 必備爬蟲套件
      run: |
        python -m pip install --upgrade pip
        # 💡 這裡已經幫你把 selenium、requests、gspread、oauth2client、openpyxl 全都補齊了！
        pip install selenium webdriver-manager requests gspread oauth2client openpyxl

    - name: 5. 執行 Python 爬蟲並同步至雲端試算表
      env:
        # 🎯【關鍵修正】：把 GitHub 的 Secret 鑰匙傳遞給 Python 腳本的環境變數
        GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
      run: |
        python LeaderBoard26-5-19.py
